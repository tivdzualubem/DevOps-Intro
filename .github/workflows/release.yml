name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish-quicknotes
    runs-on: ubuntu-24.04

    steps:
      - name: Check out tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate semantic-version tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${GITHUB_REF_NAME}"
            echo "Expected format: vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Define image metadata
        shell: bash
        run: |
          set -euo pipefail

          image_name="ghcr.io/${GITHUB_REPOSITORY,,}/quicknotes"

          echo "IMAGE_NAME=${image_name}" >> "${GITHUB_ENV}"
          echo "VERSION=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"

          echo "Image: ${image_name}"
          echo "Version: ${GITHUB_REF_NAME}"

      - name: Authenticate to GitHub Container Registry
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          printf '%s' "${GHCR_TOKEN}" |
            docker login ghcr.io \
              --username "${GITHUB_ACTOR}" \
              --password-stdin

      - name: Build versioned QuickNotes image
        shell: bash
        run: |
          set -euo pipefail

          docker build \
            --pull \
            --file app/Dockerfile \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${VERSION}" \
            --tag "${IMAGE_NAME}:${VERSION}" \
            --tag "${IMAGE_NAME}:latest" \
            app

      - name: Push immutable and latest tags
        shell: bash
        run: |
          set -euo pipefail

          docker push "${IMAGE_NAME}:${VERSION}"
          docker push "${IMAGE_NAME}:latest"

      - name: Print published image references
        shell: bash
        run: |
          set -euo pipefail

          echo "Published:"
          echo "  ${IMAGE_NAME}:${VERSION}"
          echo "  ${IMAGE_NAME}:latest"
